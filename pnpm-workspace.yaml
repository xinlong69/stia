packages:
  - "apps/*"
  - "packages/*"
  - "toolings/*"

catalog:
  "@better-auth/cli": ^1.4.21
  "@better-auth/expo": ^1.6.20
  "@eslint/js": ^9.39.4
  "@tailwindcss/postcss": ^4.3.1
  "@tanstack/react-form": ^1.33.0
  "@tanstack/react-query": ^5.101.1
  "@trpc/client": ^11.18.0
  "@trpc/server": ^11.18.0
  "@trpc/tanstack-react-query": ^11.18.0
  "@types/node": ^26.0.0
  better-auth: "^1.6.20"
  eslint: "^9.39.4"
  prettier: "^3.8.4"
  typescript: "6.0.3"
  tailwindcss: ^4.3.1
  zod: "^4.4.3"

catalogs:
  react19:
    "@types/react": "^19.2.17"
    "@types/react-dom": "^19.2.3"
    react: 19.2.7
    react-dom: 19.2.7

linkWorkspacePackages: true

allowBuilds:
  # Crucial toolchain compiler
  esbuild: true

  # Image processing (Required when using Next.js/Expo image optimization)
  sharp: true

  # Database engines (Enable what you actively use, block the rest)
  '@prisma/client': true
  better-sqlite3: true

  # Safely disabled (Falls back to pure JS without issues)
  bufferutil: false
  unrs-resolver: false

# Override specific package versions
overrides:
  better-auth: 1.6.20
  better-call: 1.3.6
  lightningcss: 1.30.1

# Public hoisting patterns for shared dependencies
publicHoistPattern:
  - "@ianvs/prettier-plugin-sort-imports"
  - prettier-plugin-tailwindcss
