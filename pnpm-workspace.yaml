packages:
  - "apps/*"
  - "packages/*"
  - "toolings/*"

catalog:
  "@better-auth/cli": ^1.4.21
  "@better-auth/expo": ^1.6.23
  "@eslint/js": ^9.39.4
  "@tailwindcss/postcss": ^4.3.2
  "@tanstack/react-form": ^1.33.1
  "@tanstack/react-query": ^5.101.2
  "@trpc/client": ^11.18.0
  "@trpc/server": ^11.18.0
  "@trpc/tanstack-react-query": ^11.18.0
  "@types/node": ^26.1.1
  better-auth: "^1.6.22"
  eslint: "^9.39.4"
  prettier: "^3.9.4"
  typescript: "6.0.3"
  tailwindcss: ^4.3.2
  zod: "^4.4.3"

catalogs:
  react19:
    "@types/react": "^19.2.17"
    "@types/react-dom": "^19.2.3"
    react: 19.2.7
    react-dom: 19.2.7

linkWorkspacePackages: true

allowBuilds:
  # Crucial toolchain compiler
  esbuild: true

  # Image processing (Required when using Next.js/Expo image optimization)
  sharp: true

  # Database engines (Enable what you actively use, block the rest)
  '@prisma/client': true
  better-sqlite3: true

  # i8nternationalization (i18n) libraries
  '@parcel/watcher': true
  '@swc/core': true

  # Safely disabled (Falls back to pure JS without issues)
  bufferutil: false
  unrs-resolver: false

# Override specific package versions
overrides:
  better-auth: 1.6.23
  better-call: 1.3.6
  lightningcss: 1.30.1

# Public hoisting patterns for shared dependencies
publicHoistPattern:
  - "@ianvs/prettier-plugin-sort-imports"
  - prettier-plugin-tailwindcss

minimumReleaseAgeExclude:
  - '@expo/cli@57.0.3'
  - '@expo/prebuild-config@57.0.3'
  - expo-modules-autolinking@57.0.3
  - expo-modules-core@57.0.1
  - expo@57.0.1
  - '@expo/ui@57.0.2'
